<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DineHub</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="hero">

        <!-- 🔴 Warning Overlay -->
        <div class="overlay">
            <div class="content">
                <span class="material-symbols-outlined">
                    gpp_maybe
                </span>
                <h3>Warning</h3>
                <p>Please fill all details correctly</p>
                <div class="closeWarning">
                    <p>Close</p>
                </div>
            </div>
        </div>

        <!-- 🏪 Restaurant Info -->
        <span id="restImg" class="material-symbols-outlined">
            storefront
        </span>

        <h1 class="restName">Restaurant</h1>

        <p class="first">
            Welcome to Hotel The Signature, Premier Luxury Hotel, where elegance,
            comfort, and modern hospitality come together to create an unforgettable stay.
        </p>

        <!-- ✅ UPDATED FORM -->
        <div class="form">

            <!-- Restaurant Code -->
            <input type="text" id="restaurantCode" placeholder="Enter Restaurant Code">

            <!-- Customer Name -->
            <input type="text" id="customerName" placeholder="Enter Your Name">

            <!-- Phone Number -->
            <input type="number" id="customerPhone" placeholder="Enter Phone Number">

        </div>

        <!-- 🔽 Bottom Section -->
        <div class="bottom">
            <div class="content">

                <div class="smallCards">

                    <div class="card">
                        <span class="material-symbols-outlined">
                            lunch_dining
                        </span>
                        <p>Food</p>
                    </div>

                    <div class="card">
                        <span class="material-symbols-outlined">
                            shopping_bag
                        </span>
                        <p>Order</p>
                    </div>

                    <div class="card">
                        <span class="material-symbols-outlined">
                            speed
                        </span>
                        <p>Faster</p>
                    </div>

                </div>

                <!-- 🚀 Continue Button -->
                <button id="continue">Continue</button>

            </div>
        </div>

    </div>

    <script type="module" src="app.js"></script>

</body>

</html>
